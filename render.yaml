# Render Blueprint — deploys the FastAPI backend.
# Frontend deploys separately on Vercel (root dir: frontend/).
services:
  - type: web
    name: argus-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL          # Supabase > Settings > Database > Connection string (URI, psycopg)
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET   # Supabase > Settings > API > JWT Secret
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false                # e.g. https://argus.vercel.app,http://localhost:3000
